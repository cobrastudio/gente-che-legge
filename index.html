<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gente che Legge</title>
  <meta name="description" content="Un angolo di pace tra i libri. Celebriamo la lettura e la gente che legge.">
  <style>
    :root {
      --ground: #F4F1E6;
      --panel: #FDFCF8;
      --ink: #0B0B0A;
      --ink-soft: #17150F;
      --grid: rgba(20, 18, 10, 0.06);
      --glow-core: #FFE23D;
      --glow-mid: rgba(255, 226, 61, 0.55);
      --radius: 30px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: var(--ground);
      color: var(--ink);
      font-family: "Helvetica Neue", Helvetica, Arial, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
      padding: clamp(10px, 2vw, 22px);
      min-height: 100dvh;
      display: flex;
    }
    .frame {
      position: relative; flex: 1;
      background: var(--panel);
      border-radius: var(--radius);
      overflow: hidden;
      display: flex; flex-direction: column;
      min-height: calc(100dvh - clamp(20px, 4vw, 44px));
      box-shadow: 0 1px 0 rgba(0,0,0,0.04);
    }
    .glow {
      position: absolute; inset: 0;
      background: radial-gradient(60% 60% at 78% 62%,
        var(--glow-core) 0%, var(--glow-mid) 32%,
        rgba(255, 226, 61, 0.10) 58%, transparent 78%);
      pointer-events: none; z-index: 0;
    }
    .grid {
      position: absolute; inset: 0; z-index: 1; pointer-events: none;
      background-image: linear-gradient(to right, var(--grid) 1px, transparent 1px);
      background-size: 25% 100%; background-position: 0 0;
    }
    .grid::after {
      content: ""; position: absolute; inset: 0;
      border-bottom: 1px solid var(--grid);
      top: clamp(112px, 15vh, 168px); height: 1px;
    }
    .content {
      position: relative; z-index: 2; flex: 1;
      display: flex; flex-direction: column;
      padding: clamp(26px, 4vw, 52px);
    }
    header {
      display: flex; justify-content: space-between;
      align-items: flex-start; gap: 24px;
    }
    .logo {
      display: flex; align-items: center; gap: 10px;
      font-size: clamp(20px, 2.4vw, 27px);
      font-weight: 700; letter-spacing: -0.02em; white-space: nowrap;
    }
    .logo .mark { width: 1.15em; height: 1.15em; flex: 0 0 auto; }
    .logo .mark path, .logo .mark line {
      fill: none; stroke: var(--ink); stroke-width: 1.6;
      stroke-linejoin: round; stroke-linecap: round;
      vector-effect: non-scaling-stroke;
    }
    .tagline {
      max-width: 40ch; text-align: right;
      font-size: clamp(12px, 1.15vw, 15px);
      line-height: 1.45; font-weight: 600;
      letter-spacing: -0.005em; color: var(--ink-soft);
    }
    .hero {
      margin-top: auto; display: flex;
      align-items: flex-end; justify-content: space-between;
      gap: clamp(16px, 4vw, 60px);
    }
    h1 {
      font-size: clamp(48px, 12vw, 168px);
      line-height: 0.92; font-weight: 700;
      letter-spacing: -0.035em; text-wrap: balance; max-width: 15ch;
    }
    .arrow {
      flex: 0 0 auto; width: clamp(48px, 8vw, 118px);
      height: auto; margin-bottom: clamp(6px, 1.5vw, 22px);
    }
    .arrow line, .arrow polyline {
      stroke: var(--ink); stroke-width: 7; fill: none;
      stroke-linecap: square; stroke-linejoin: miter;
    }
    @media (max-width: 640px) {
      .tagline { display: none; }
      .grid { background-size: 50% 100%; }
      .hero { align-items: center; }
    }
    @media (prefers-reduced-motion: no-preference) {
      h1, .tagline, .logo, .arrow { animation: rise 0.9s cubic-bezier(.2,.7,.2,1) both; }
      .logo { animation-delay: 0.05s; }
      .tagline { animation-delay: 0.15s; }
      h1 { animation-delay: 0.25s; }
      .arrow { animation-delay: 0.45s; }
      @keyframes rise {
        from { opacity: 0; transform: translateY(18px); }
        to { opacity: 1; transform: translateY(0); }
      }
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="glow"></div>
    <div class="grid"></div>
    <div class="content">
      <header>
        <div class="logo">
          <svg class="mark" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 5.5C10 4 6.5 3.6 3.5 4v14c3-.4 6.5 0 8.5 1.5 2-1.5 5.5-1.9 8.5-1.5V4c-3-.4-6.5 0-8.5 1.5Z"/>
            <line x1="12" y1="5.5" x2="12" y2="19.5"/>
          </svg>
          <span>Gente che Legge</span>
        </div>
        <p class="tagline">Celebriamo la lettura e la gente che legge.</p>
      </header>
      <div class="hero">
        <h1>Un angolo di pace tra i libri.</h1>
        <svg class="arrow" viewBox="0 0 60 90" aria-hidden="true">
          <line x1="30" y1="4" x2="30" y2="80" />
          <polyline points="6,56 30,82 54,56" />
        </svg>
      </div>
    </div>
  </div>
</body>
</html>
